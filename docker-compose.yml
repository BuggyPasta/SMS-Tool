version: '3.8'

services:
  sms-tool:
    build:
      context: https://github.com/BuggyPasta/SMS-Tool.git#main
    container_name: sms-tool
    ports:
      - "4001:4001"
    volumes:
      - ${PWD}/database:/app/database
      - ${PWD}/logs:/app/logs
      - ${PWD}/docker/gammu/gammurc:/root/gammurc
    devices:
      - /dev/ttyUSB3
    environment:
      - FLASK_APP=app
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - TZ=Europe/London
      - PYTHONUNBUFFERED=1
      - GAMMU_CONFIG=/root/gammurc
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    privileged: true
    user: root
    labels:
      - "com.centurylinklabs.watchtower.enable=false"