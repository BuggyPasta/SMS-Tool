version: '3.8'

services:
  sms-tool:
    build: .
    container_name: sms-tool
    restart: unless-stopped
    privileged: true
    ports:
      - "4001:4001"
    volumes:
      - ./database:/app/database
      - ./instance:/app/instance
      - ./logs:/app/logs
      - /dev/ttyUSB3:/dev/ttyUSB3
    group_add:
      - dialout
    environment:
      - FLASK_APP=app
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - TZ=Europe/London
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "which curl || (apt-get update && apt-get install -y curl)", "&&", "curl", "-f", "http://localhost:4001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    labels:
      - "com.centurylinklabs.watchtower.enable=false"