# Docker Compose configuration 
version: '3.8'

services:
  sms-tool:
    build: .
    container_name: sms-tool
    ports:
      - "4001:4001"
    volumes:
      - /home/alex/docker_backup/sms-tool/database:/app/database
      - /home/alex/docker_backup/sms-tool/logs:/app/logs
      - ./docker/gammu/gammurc:/root/.gammurc
    devices:
      - /dev/ttyUSB0
    environment:
      - FLASK_APP=app
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - TZ=Europe/London
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    privileged: true
    user: root 