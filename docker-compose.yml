version: '3.8'

services:
  sms-tool:
    build:
      context: https://github.com/BuggyPasta/SMS-Tool.git#main
      dockerfile: Dockerfile
    container_name: sms-tool
    restart: unless-stopped
    privileged: true
    ports:
      - "4001:4001"
    volumes:
      - /home/ovenking/docker_backup/sms_tool/instance:/app/instance
      - /home/ovenking/docker_backup/sms_tool/logs:/app/logs
      - /dev/ttyUSB3:/dev/ttyUSB3
    group_add:
      - dialout
    environment:
      - FLASK_APP=app
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - TZ=Europe/London
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-v", "-f", "http://localhost:4001/health"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 60s
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    labels:
      - "com.centurylinklabs.watchtower.enable=false"