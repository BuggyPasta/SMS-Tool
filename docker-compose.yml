version: '3.8'

services:
  sms-tool:
    build:
      context: https://github.com/BuggyPasta/SMS-Tool.git#main
      dockerfile: Dockerfile
    container_name: sms-tool
    ports:
      - "4001:4001"
    volumes:
      - /home/ovenking/docker_backup/sms_tool/database:/app/database
      - /home/ovenking/docker_backup/sms_tool/logs:/app/logs
    devices:
      - /dev/ttyUSB3:/dev/ttyUSB3
    group_add:
      - dialout
    environment:
      - FLASK_APP=app
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - TZ=Europe/London
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "which curl || (apt-get update && apt-get install -y curl)", "&&", "curl", "-f", "http://localhost:4001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    privileged: true
    user: root
    labels:
      - "com.centurylinklabs.watchtower.enable=false"